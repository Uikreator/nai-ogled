function nastejNizko(arr) {
  const a = arr.filter(Boolean).map(x => x.toLowerCase());
  if (!a.length) return '';
  if (a.length === 1) return a[0];
  if (a.length === 2) return a[0] + ' in ' + a[1];
  return a.slice(0,-1).join(', ') + ' ter ' + a[a.length-1];
}

function nastejViso(arr) {
  const a = arr.filter(Boolean);
  if (!a.length) return '';
  if (a.length === 1) return a[0];
  if (a.length === 2) return a[0] + ' in ' + a[1];
  return a.slice(0,-1).join(', ') + ' ter ' + a[a.length-1];
}

function arrPlus(arr, extra) {
  const base = Array.isArray(arr) ? arr : (arr ? [arr] : []);
  return extra ? [...base, extra] : base;
}

const OGR_MAP = {
  'el. peč':                       'električna peč',
  'cen. peč na biomaso':           'centralna peč na biomaso',
  'cen. peč na kurilno olje':      'centralna peč na kurilno olje',
  'cen. plinska peč':              'centralna plinska peč',
  'sam. plinska peč':              'samostojna plinska peč',
  'sam. peč na kurilno olje':      'samostojna peč na kurilno olje',
  'sam. peč na biomaso':           'samostojna peč na biomaso',
  'toplotna črpalka':              'toplotna črpalka',
  'el. grelnik':                   'električni grelnik',
  'električni grelnik':            'električni grelnik',
  'daljinska toplota':             'daljinsko ogrevanje',
  'klimatska naprava':             'klimatska naprava',
  'ploskovna v talnem razvodu':    'ploskovna v talnem razvodu',
  'električni grelniki':           'električni grelniki',
  'konvertorji':                   'konvertorji',
};
function normOgr(s) {
  return OGR_MAP[s.toLowerCase()] || s.toLowerCase();
}
function nastejOgr(arr) {
  return nastejNizko(arr.map(normOgr));
}


function genNadstropje(nadstropje, dvigalo) {
  if (!nadstropje) return '';
  const NADR_MAP = {
    'P':'pritličju', 'VP':'visokem pritličju',
    '1':'prvem nadstropju','2':'drugem nadstropju','3':'tretjem nadstropju',
    '4':'četrtem nadstropju','5':'petem nadstropju','6':'šestem nadstropju',
    '7':'sedmem nadstropju','8':'osmem nadstropju','9':'devetem nadstropju',
    '10':'desetem nadstropju','Drugo':'višjem nadstropju'
  };
  const nadrTxt = NADR_MAP[nadstropje] || (nadstropje + '. nadstropju');
  const dvigaloTxt = dvigalo === 'Da' ? ' z dvigalom' : dvigalo === 'Ne' ? ' brez dvigala' : '';
  return nadrTxt + dvigaloTxt;
}

function genOrientacija(o) {
  if (o.orient_VSE || ['S','J','V','Z','SZ','SV','JV','JZ'].filter(k=>o['orient_'+k]).length >= 4)
    return 'Stanovanje ima vsestransko orientacijo.';
  const MAP = {S:'severu',J:'jugu',V:'vzhodu',Z:'zahodu',SZ:'severozahodu',SV:'severovzhodu',JV:'jugovzhodu',JZ:'jugozahodu'};
  const smeri = ['S','J','V','Z','SZ','SV','JV','JZ'].filter(k=>o['orient_'+k]).map(k=>MAP[k]);
  if (!smeri.length) return '';
  return 'Orientirano je proti ' + nastejNizko(smeri) + '.';
}

function genObjektOpis(st) {
  const n = parseInt(st);
  if (!st || isNaN(n)) return 'večstanovanjskega objekta';
  if (n === 2) return 'dvo-stanovanjskega objekta';
  if (n === 3) return 'tro-stanovanjskega objekta';
  if (n === 4) return 'štiri-stanovanjskega objekta';
  return 'večstanovanjskega objekta';
}

function genProstoriStan(prostori) {
  const PROS_IME = {
    predprostor:'predprostor', hodnik:'hodnik', stranisce:'stranišče',
    kopalnica:'kopalnica', soba:'soba', spalnica:'spalnica',
    kuhinja:'kuhinja', jedilnica:'jedilnica', dnevna:'dnevna soba',
    galerija:'galerija', loza:'loža', balkon:'balkon', terasa:'terasa',
    shramba:'shramba',
  };
  const ep = (prostori||{})['STA'] || {};
  const seznam = [];
  Object.entries(ep).forEach(([k,n]) => {
    if (!n || k === 'drugo_text') return;
    const ime = PROS_IME[k] || k;
    seznam.push(n > 1 ? n + 'x ' + ime : ime);
  });
  if (ep['drugo_text']) seznam.push(ep['drugo_text']);
  return seznam;
}


function genOpisPoslovni(o) {
  // Poslovni objekt — samo povzetek podatkov, brez generiranega opisa
  const rows = [];
  if (o.vrsta)          rows.push('Tip objekta: ' + o.vrsta);
  if (o.leto_izgradnje) rows.push('Leto izgradnje: ' + o.leto_izgradnje);
  if (o.povrsina)       rows.push('Površina: ' + o.povrsina + ' m²');
  if (o.vseljeno)       rows.push('Zaseden: ' + o.vseljeno);
  if (o.vzdrzevano)     rows.push('Vzdrževan: ' + o.vzdrzevano);

  // Prostori
  const ep = (o.prostori||{})['POS'] || {};
  const PROS_POS = {
    pisarna:'pisarna',hodnik:'hodnik',stranisce:'stranišče',kopalnica:'kopalnica',
    shramba:'shramba',garaza:'garaža',sejna:'sejna soba',recepcija:'recepcija',
    arhiv:'arhiv',kuhinja:'kuhinja',skladisce:'skladišče',tehnicni:'tehnični prostor',
  };
  const seznam = [];
  Object.entries(ep).forEach(([k,n]) => {
    if (!n || k === 'drugo_text') return;
    seznam.push(n > 1 ? n + 'x ' + (PROS_POS[k]||k) : (PROS_POS[k]||k));
  });
  if (ep['drugo_text']) seznam.push(ep['drugo_text']);
  if (seznam.length) rows.push('Prostori: ' + seznam.join(', '));

  // Inštalacije
  const tlVsi = [...(o.tlaki||[]),...(o.tlaki_drugo?[o.tlaki_drugo]:[])];
  if (tlVsi.length) rows.push('Finalni tlaki: ' + tlVsi.join(', '));
  if (o.zasteklitev_tip || o.zasteklitev_okvir)
    rows.push('Zasteklitev: ' + [o.zasteklitev_tip, o.zasteklitev_okvir].filter(Boolean).join(', '));
  const ogrP = [...(o.ogr_prostori||[]),...(o.ogr_prostori_drugo?[o.ogr_prostori_drugo]:[])];
  if (ogrP.length) rows.push('Ogrevanje: ' + ogrP.join(', '));
  const ogrElem = [...(o.ogrevala||[]),...(o.ogrevala_drugo?[o.ogrevala_drugo]:[])];
  if (ogrElem.length) rows.push('Ogrevala: ' + ogrElem.join(', '));
  if (o.prezracevanje) rows.push('Prezračevanje: ' + o.prezracevanje);

  // Priključki
  const prikl = [];
  if (o.prikl_elektrika==='Da') prikl.push('elektrika');
  if (o.prikl_vodovod==='Da')   prikl.push('vodovod');
  if (o.prikl_kanal==='Da')     prikl.push('kanalizacija');
  if (o.prikl_plin==='Da')      prikl.push('plin');
  if (o.prikl_telekom==='Da')   prikl.push('telekomunikacije');
  if (prikl.length) rows.push('Priključki: ' + prikl.join(', '));
  if (o.prikl_parkiranje&&o.prikl_parkiranje.length) rows.push('Parkiranje: ' + o.prikl_parkiranje.join(', '));

  // Cena
  const fmtCena = v => !v?'':v==='ne_prodaja'?'Se ne prodaja':v==='ne_povejo'?'Ne povejo':v+' €';
  if (o.cena_oglas)  rows.push('Oglaševana cena: ' + fmtCena(o.cena_oglas));
  if (o.cena_pogodba) rows.push('Pogodbena cena: ' + fmtCena(o.cena_pogodba));
  if (o.dokumentacija) rows.push('Dokumentacija: ' + o.dokumentacija);
  if (o.posebnosti && o.posebnosti.trim()) rows.push('Posebnosti: ' + o.posebnosti.trim());

  return rows.join('\n');
}


function genOpisStan(o) {
  const odst1 = [];
  const odst2 = [];

  // 1. Uvod — tip objekta + leto izgradnje
  let uvod = 'Objekt predstavlja ' + genObjektOpis(o.st_stanovanj);
  if (o.leto_izgradnje)
    uvod += ', ki je bil po podatkih pridobljenih na ogledu zgrajen leta ' + o.leto_izgradnje;
  uvod += '.';
  odst1.push(uvod);

  // 2. Obnove
  if (o.obnove) {
    const status = o.obnove['_status'];
    if (status === 'ni_obnovljeno') {
      odst1.push('Na podlagi informacij, pridobljenih ob ogledu nepremičnine, stanovanje ni bilo deleženo obnov.');
    } else if (status === 'ni_podatka') {
      odst1.push('Podatki o izvedenih obnovah stanovanja niso znani.');
    } else {
      const SPOL = {
        celotna:  {glag1:'je bilo stanovanje v celoti obnovljeno'},
        streha:   {glag1:'je bila obnovljena streha', glagSkup:'streha'},
        fasada:   {glag1:'je bila obnovljena fasada', glagSkup:'fasada'},
        okna:     {glag1:'so bila zamenjana okna', glagSkup:'okna'},
        vrata_vh: {glag1:'so bila zamenjana vhodna vrata', glagSkup:'vhodna vrata'},
        vrata_not:{glag1:'so bila zamenjana notranja vrata', glagSkup:'notranja vrata'},
        tlaki:    {glag1:'so bili obnovljeni finalni tlaki', glagSkup:'finalni tlaki'},
        radiatorji:{glag1:'so bili zamenjani radiatorji', glagSkup:'radiatorji'},
        el_inst:  {glag1:'so bile obnovljene električne instalacije', glagSkup:'električne instalacije'},
        vod_inst: {glag1:'so bile obnovljene vodovodne instalacije', glagSkup:'vodovodne instalacije'},
        kopalnica:{glag1:'je bila v celoti obnovljena kopalnica', glagSkup:'kopalnica'},
        stranisce:{glag1:'je bilo v celoti obnovljeno stranišče', glagSkup:'stranišče'},
        pec:      {glag1:'je bila zamenjana peč', glagSkup:'peč'},
      };
      const byYear = {};
      Object.entries(o.obnove).forEach(([k,v]) => {
        if (k === '_status' || !v || !v.leto) return;
        if (!byYear[v.leto]) byYear[v.leto] = [];
        if (k === 'drugo') { if (v.ime) byYear[v.leto].push({k:'drugo', ime:v.ime}); }
        else if (SPOL[k])  byYear[v.leto].push({k, ime: SPOL[k].glagSkup || k});
      });
      const leta = Object.keys(byYear).sort();
      if (leta.length) {
        const deliObnov = [];
        leta.forEach(leto => {
          const elems = byYear[leto];
          if (!elems.length) return;
          if (elems.length === 1) {
            const e = elems[0];
            if (e.k === 'celotna')
              deliObnov.push('leta ' + leto + ' je bilo stanovanje v celoti obnovljeno');
            else
              deliObnov.push('leta ' + leto + ' ' + (SPOL[e.k] ? SPOL[e.k].glag1 : 'je bil obnovljen ' + e.ime));
          } else {
            const imeni = elems.map(e => e.ime || e.k);
            deliObnov.push('leta ' + leto + ' so bili obnovljeni: ' + nastejNizko(imeni));
          }
        });
        if (deliObnov.length) {
          odst1.push('Po podatkih pridobljenih na ogledu so bile izvedene naslednje obnove: ' +
            deliObnov.map(d => d.charAt(0).toUpperCase() + d.slice(1) + '.').join(' '));
        }
      }
    }
  }

  // 3. Vseljenost
  const vs = o.vseljeno, vz = o.vzdrzevano;
  if (vs && vz) {
    const M = {
      'Da-Da':'V času ogleda je bilo stanovanje zasedeno in redno vzdrževan.',
      'Da-Ne':'V času ogleda je bilo stanovanje zasedeno, vendar ni redno vzdrževan.',
      'Ne-Da':'V času ogleda stanovanje ni bilo zasedeno, je pa redno vzdrževan.',
      'Ne-Ne':'V času ogleda stanovanje ni bilo zasedeno in ni redno vzdrževan.',
    };
    odst1.push(M[vs+'-'+vz] || '');
  } else if (vs) {
    odst1.push('V času ogleda je bilo stanovanje ' + (vs==='Da'?'vseljeno':'nevseljeno') + '.');
  }

  // 4. Nadstropje + objekt
  if (o.nadstropje) {
    const nadrTxt = genNadstropje(o.nadstropje, null);
    const dvigaloTxt = o.dvigalo === 'Da' ? ' z dvigalom' : o.dvigalo === 'Ne' ? ' brez dvigala' : '';
    const objTxt = genObjektOpis(o.st_stanovanj);
    odst2.push('Stanovanje se nahaja v ' + nadrTxt + ' ' + objTxt + dvigaloTxt + '.');
  }

  // 5. Orientacija
  const orientTxt = genOrientacija(o);
  if (orientTxt) odst2.push(orientTxt);

  // 6. Prostori
  if (o.tip === 'stan_v_hisi') {
    const ETAZ_L2 = {K:'kleti',P:'pritličju','1N':'prvem nadstropju','2N':'drugem nadstropju',M:'mansardi'};
    const PROS_SVH = {predprostor:'predprostor',hodnik:'hodnik',tehnicni:'tehnični prostor',
      kurilnica:'kurilnica',shramba:'shramba',utility:'utility',garaza:'garaža',
      stranisce:'stranišče',kopalnica:'kopalnica',soba:'soba',spalnica:'spalnica',
      kuhinja:'kuhinja',jedilnica:'jedilnica',dnevna:'dnevna soba',galerija:'galerija',
      loza:'loža',balkon:'balkon',terasa:'terasa'};
    if (o.etaznost) odst2.push('Stanovanjska enota je etažnosti ' + o.etaznost + '.');
    if (o.prostori) {
      ['K','P','1N','2N','M'].forEach(function(e) {
        const ep2 = o.prostori[e] || {};
        const jeNeizd2 = (o.neizdelano||[]).includes(e);
        if (jeNeizd2) return;
        const ps = [];
        Object.entries(ep2).forEach(function(kv) {
          const k = kv[0], n = kv[1];
          if (!n || k === 'drugo_text') return;
          ps.push(n > 1 ? n + 'x ' + (PROS_SVH[k]||k) : (PROS_SVH[k]||k));
        });
        if (ep2['drugo_text']) ps.push(ep2['drugo_text']);
        if (ps.length) odst2.push('V ' + ETAZ_L2[e] + ' se nahajajo: ' + nastejViso(ps) + '.');
      });
    }
  } else {
    const seznam = genProstoriStan(o.prostori);
    if (seznam.length) odst2.push('V stanovanju so naslednji prostori: ' + nastejViso(seznam) + '.');
  }

  // 7. Tlaki
  const tlVsi = [...(o.tlaki||[]), ...(o.tlaki_drugo?[o.tlaki_drugo]:[])];
  if (tlVsi.length) odst2.push('Finalni tlaki so ' + nastejNizko(tlVsi) + '.');

  // 8. Okna
  if (o.zasteklitev_tip || o.zasteklitev_okvir) {
    const tipMap = {'Starejša':'starejša','2-slojna':'2-slojna','3-slojna':'3-slojna'};
    const okvirMap = {'PVC':'PVC','ALU':'ALU','Leseni':'lesenih','PVC/ALU':'PVC/ALU','ALU/Les':'ALU/lesenih'};
    const tip = tipMap[o.zasteklitev_tip] || o.zasteklitev_tip || '';
    const okvir = okvirMap[o.zasteklitev_okvir] || o.zasteklitev_okvir || '';
    if (tip && okvir) odst2.push('Okna so ' + tip + ' v ' + okvir + ' okvirjih.');
    else if (tip) odst2.push('Okna so ' + tip + '.');
    else if (okvir) odst2.push('Okna so v ' + okvir + ' okvirjih.');
  }

  // 9. Ogrevanje
  const ogrP = arrPlus(o.ogr_prostori, o.ogr_prostori_drugo);
  const ogrV = arrPlus(o.ogr_voda, o.ogr_voda_drugo);
  if (ogrP.length && ogrV.length && JSON.stringify(ogrP.map(x=>x.toLowerCase())) === JSON.stringify(ogrV.map(x=>x.toLowerCase())))
    odst2.push('Za ogrevanje in pripravo tople sanitarne vode se uporablja ' + nastejOgr(ogrP) + '.');
  else {
    if (ogrP.length) odst2.push('Za ogrevanje se uporablja ' + nastejOgr(ogrP) + '.');
    if (ogrV.length) odst2.push('Za pripravo tople sanitarne vode se uporablja ' + nastejOgr(ogrV) + '.');
  }
  const ogrElemFull = [...(o.ogrevala||[]), ...(o.ogrevala_drugo?[o.ogrevala_drugo]:[])];
  if (ogrElemFull.length) {
    odst2.push('Ogrevala so ' + nastejNizko(ogrElemFull.map(x => x.toLowerCase())) + '.');
  }

  // 10. Priključki (za stanovanje v hiši)
  if (o.tip === 'stan_v_hisi') {
    const prikl = [];
    if (o.prikl_elektrika === 'Da') prikl.push('elektrodistribucijsko omrežje');
    if (o.prikl_vodovod   === 'Da') prikl.push('javni vodovod');
    if (o.prikl_kanal     === 'Da') prikl.push('javno kanalizacijsko omrežje');
    if (o.prikl_plin      === 'Da') prikl.push('plinovodno omrežje');
    if (o.prikl_telekom   === 'Da') prikl.push('telekomunikacijsko omrežje');
    if (prikl.length) odst2.push('Objekt je priključen na ' + nastejViso(prikl) + '.');
  }

  // 11. Parkiranje
  if (o.prikl_parkiranje && o.prikl_parkiranje.length) {
    const PARK_MAP = {
      'Garaža v objektu':'v garaži objekta','Garaža ob objektu':'v garaži ob objektu',
      'Na dvorišču':'na dvorišču','Pod nadstreškom':'pod nadstreškom','Ni urejeno':null,
    };
    const parkOk = o.prikl_parkiranje.filter(x=>PARK_MAP[x]!==null).map(x=>PARK_MAP[x]||x.toLowerCase());
    if (parkOk.length) odst2.push('Parkiranje je urejeno ' + nastejNizko(parkOk) + '.');
    else if (o.prikl_parkiranje.includes('Ni urejeno')) odst2.push('Parkiranje je mogoče v okolici objekta.');
  }

  const deli = [];
  if (odst1.length) deli.push(odst1.join(' '));
  if (odst2.length) deli.push(odst2.join(' '));
  if (o.posebnosti && o.posebnosti.trim()) deli.push(o.posebnosti.trim());
  return deli.join('\n\n');
}


function genOpis(o) {
  if (o.tip === 'stanovanje' || o.tip === 'stan_v_hisi') return genOpisStan(o);
  if (o.tip === 'poslovni') return genOpisPoslovni(o);
  if (o.tip !== 'hisa') return tipL(o.tip) + '. (Podatki v pripravi.)';

  const odst1 = []; // prvi odstavek: obnove + vseljenost
  const odst2 = []; // drugi odstavek: etažnost + prostori + tlaki + okna + ogrevanje + priključki + parkiranje

  // ── 1. TIP HIŠE ──────────────────────────────────────────────
  const vrstaIme = {
    'Samostojna': 'samostojno stanovanjsko hišo',
    'Dvojček':    'hišo — dvojček',
    'Vrstna':     'vrstno hišo',
    'Atrijska':   'atrijsko hišo',
  }[o.vrsta] || (o.vrsta ? o.vrsta.toLowerCase() + ' hišo' : 'stanovanjsko hišo');

  // ── 2. LETO IZGRADNJE ─────────────────────────────────────────
  let uvod = 'Objekt predstavlja ' + vrstaIme;
  if (o.leto_izgradnje)
    uvod += ', ki je bila po podatkih pridobljenih na ogledu zgrajena leta ' + o.leto_izgradnje;
  uvod += '.';
  odst1.push(uvod);

  // ── 3. OBNOVE ─────────────────────────────────────────────────
  const SPOL = {
    celotna:   {glag1:'v celoti obnovljen'},
    streha:    {glag1:'je bila obnovljena streha', glagSkup:'streha'},
    fasada:    {glag1:'je bila obnovljena fasada', glagSkup:'fasada'},
    okna:      {glag1:'so bila zamenjana okna', glagSkup:'okna'},
    vrata_vh:  {glag1:'so bila zamenjana vhodna vrata', glagSkup:'vhodna vrata'},
    vrata_not: {glag1:'so bila zamenjana notranja vrata', glagSkup:'notranja vrata'},
    tlaki:     {glag1:'so bili obnovljeni finalni tlaki', glagSkup:'finalni tlaki'},
    radiatorji:{glag1:'so bili zamenjani radiatorji', glagSkup:'radiatorji'},
    el_inst:   {glag1:'so bile obnovljene električne instalacije', glagSkup:'električne instalacije'},
    vod_inst:  {glag1:'so bile obnovljene vodovodne instalacije', glagSkup:'vodovodne instalacije'},
    kopalnica: {glag1:'je bila v celoti obnovljena kopalnica', glagSkup:'kopalnica'},
    stranisce: {glag1:'je bilo v celoti obnovljeno stranišče', glagSkup:'stranišče'},
    pec:       {glag1:'je bila zamenjana centralna peč', glagSkup:'centralna peč'},
  };

  if (o.obnove) {
    const status = o.obnove['_status'];
    if (status === 'ni_obnovljeno') {
      odst1.push('Na podlagi informacij, pridobljenih ob ogledu nepremičnine, objekt ni bil deležen obnov.');
    } else if (status === 'ni_podatka') {
      odst1.push('Podatki o izvedenih obnovah objekta niso znani.');
    } else {
      // Grupiraj po letnici
      const byYear = {};
      Object.entries(o.obnove).forEach(([k, v]) => {
        if (k === '_status' || !v || !v.leto) return;
        if (!byYear[v.leto]) byYear[v.leto] = [];
        if (k === 'drugo') { if (v.ime) byYear[v.leto].push({k:'drugo', ime:v.ime}); }
        else if (SPOL[k])  byYear[v.leto].push({k, ime: SPOL[k].glagSkup || k});
      });

      const leta = Object.keys(byYear).sort();
      if (leta.length) {
        const deliObnov = [];
        leta.forEach(leto => {
          const elems = byYear[leto];
          if (!elems.length) return;
          if (elems.length === 1) {
            const e = elems[0];
            if (e.k === 'celotna')
              deliObnov.push('leta ' + leto + ' je bil objekt v celoti obnovljen');
            else
              deliObnov.push('leta ' + leto + ' ' + (SPOL[e.k] ? SPOL[e.k].glag1 : 'je bil obnovljen ' + e.ime));
          } else {
            const imeni = elems.map(e => e.ime || e.k);
            deliObnov.push('leta ' + leto + ' so bili obnovljeni: ' + nastejNizko(imeni));
          }
        });
        if (deliObnov.length) {
          const stavek = 'Po podatkih pridobljenih na ogledu so bile izvedene naslednje obnove: ' +
            deliObnov.map((d,i) => {
              // capitalize first letter of each
              return d.charAt(0).toUpperCase() + d.slice(1) + '.';
            }).join(' ');
          odst1.push(stavek);
        }
      }
    }
  }

  // ── 4. VSELJENOST × VZDRŽEVANOST ──────────────────────────────
  const vs = o.vseljeno, vz = o.vzdrzevano;
  if (vs && vz) {
    const MATRIKA = {
      'Da-Da': 'V času ogleda je bila stanovanjska hiša zasedena in redno vzdrževana.',
      'Da-Ne': 'V času ogleda je bila stanovanjska hiša zasedena, vendar ni redno vzdrževana.',
      'Ne-Da': 'V času ogleda stanovanjska hiša ni bila zasedena, je pa redno vzdrževana.',
      'Ne-Ne': 'V času ogleda stanovanjska hiša ni bila zasedena in ni redno vzdrževana.',
    };
    odst1.push(MATRIKA[vs + '-' + vz] || '');
  } else if (vs) {
    odst1.push('V času ogleda je bila stanovanjska hiša ' + (vs === 'Da' ? 'zasedena' : 'nezasedena') + '.');
  }

  // ── 5. ETAŽNOST (opisna) ──────────────────────────────────────
  const ETAZ_OPIS = {
    'P':         'pritličje',
    'K+P':       'klet in pritličje',
    'P+M':       'pritličje in mansarda',
    'P+1':       'pritličje in eno nadstropje',
    'P+1+M':     'pritličje, eno nadstropje in mansarda',
    'P+2':       'pritličje in dve nadstropji',
    'P+2+M':     'pritličje, dve nadstropji in mansarda',
    'K+P+1':     'klet, pritličje in eno nadstropje',
    'K+P+1+M':   'klet, pritličje, eno nadstropje in mansarda',
    'K+P+2':     'klet, pritličje in dve nadstropji',
    'K+P+2+M':   'klet, pritličje, dve nadstropji in mansarda',
  };
  if (o.etaznost) {
    const eOpis = ETAZ_OPIS[o.etaznost] || o.etaznost;
    odst2.push('Stanovanjska hiša je etažnosti ' + eOpis + '.');
  }

  // ── 6. PROSTORI PO ETAŽAH ─────────────────────────────────────
  const ETAZ_L = {K:'kleti', P:'pritličju', '1N':'prvem nadstropju', '2N':'drugem nadstropju', M:'mansardi'};
  const PROS_IME = {
    predprostor:'predprostor', hodnik:'hodnik', tehnicni:'tehnični prostor',
    kurilnica:'kurilnica', shramba:'shramba', utility:'utility', garaza:'garaža',
    stranisce:'stranišče', kopalnica:'kopalnica', soba:'soba', spalnica:'spalnica',
    kuhinja:'kuhinja', jedilnica:'jedilnica', dnevna:'dnevna soba', galerija:'galerija',
    loza:'loža', balkon:'balkon', terasa:'terasa',
  };
  if (o.prostori) {
    ['K','P','1N','2N','M'].forEach(e => {
      const ep = o.prostori[e] || {};
      const jeNeizd = (o.neizdelano||[]).includes(e);
      if (jeNeizd) {
        const neizOpis = {K:'Klet je neizdelana.', P:'Pritličje je neizdelano.',
          '1N':'Prvo nadstropje je neizdelano.', '2N':'Drugo nadstropje je neizdelano.', M:'Mansarda je neizdelana.'};
        odst2.push(neizOpis[e]);
        return;
      }
      const seznam = [];
      Object.entries(ep).forEach(([k, n]) => {
        if (!n || k === 'drugo_text') return;
        const ime = PROS_IME[k] || k;
        seznam.push(n > 1 ? n + 'x ' + ime : ime);
      });
      if (ep['drugo_text']) seznam.push(ep['drugo_text']);
      if (seznam.length)
        odst2.push('V ' + ETAZ_L[e] + ' se nahajajo: ' + nastejViso(seznam) + '.');
    });
  }
  if (o.neizd_drugo && o.neizd_drugo.trim())
    odst2.push(o.neizd_drugo.trim() + ' je neizdelano.');
  if (o.opombe_prostori) odst2.push(o.opombe_prostori);

  // ── 7. FINALNI TLAKI ──────────────────────────────────────────
  const tlVsi = [...(o.tlaki||[]), ...(o.tlaki_drugo ? [o.tlaki_drugo] : [])];
  if (tlVsi.length) odst2.push('Finalni tlaki so ' + nastejNizko(tlVsi) + '.');

  // ── 8. OKNA / ZASTEKLITEV ─────────────────────────────────────
  if (o.zasteklitev_tip || o.zasteklitev_okvir) {
    const tipMap = {
      'Starejša': 'starejša',
      '2-slojna': '2-slojna',
      '3-slojna': '3-slojna',
    };
    const okvirMap = {
      'PVC': 'PVC', 'ALU': 'ALU', 'Leseni': 'lesenih', 'PVC/ALU': 'PVC/ALU', 'ALU/Les': 'ALU/lesenih',
    };
    const tip = tipMap[o.zasteklitev_tip] || o.zasteklitev_tip || '';
    const okvir = okvirMap[o.zasteklitev_okvir] || o.zasteklitev_okvir || '';
    if (tip && okvir)
      odst2.push('Okna so ' + tip + ' v ' + okvir + ' okvirjih.');
    else if (tip)
      odst2.push('Okna so ' + tip + '.');
    else if (okvir)
      odst2.push('Okna so v ' + okvir + ' okvirjih.');
  }

  // ── 9. OGREVANJE ──────────────────────────────────────────────
  const ogrP = arrPlus(o.ogr_prostori, o.ogr_prostori_drugo);
  const ogrV = arrPlus(o.ogr_voda, o.ogr_voda_drugo);
  if (ogrP.length && ogrV.length && JSON.stringify(ogrP.map(x=>x.toLowerCase())) === JSON.stringify(ogrV.map(x=>x.toLowerCase())))
    odst2.push('Za ogrevanje in pripravo tople sanitarne vode se uporablja ' + nastejOgr(ogrP) + '.');
  else {
    if (ogrP.length) odst2.push('Za ogrevanje se uporablja ' + nastejOgr(ogrP) + '.');
    if (ogrV.length) odst2.push('Za pripravo tople sanitarne vode se uporablja ' + nastejOgr(ogrV) + '.');
  }
  const ogrElemFull = [...(o.ogrevala||[]), ...(o.ogrevala_drugo ? [o.ogrevala_drugo] : [])];
  if (ogrElemFull.length) {
    const opisOgr = nastejNizko(ogrElemFull.map(x =>
      x.toLowerCase()
    ));
    odst2.push('Ogrevala so ' + opisOgr + '.');
  }

  // ── 10. PARKIRANJE ────────────────────────────────────────────
  if (o.prikl_parkiranje && o.prikl_parkiranje.length) {
    const PARK_MAP = {
      'Garaža v objektu':  'v garaži objekta',
      'Garaža ob objektu': 'v garaži ob objektu',
      'Na dvorišču':       'na dvorišču',
      'Pod nadstreškom':   'pod nadstreškom',
      'Ni urejeno':        null,
    };
    const parkOk = o.prikl_parkiranje.filter(x => PARK_MAP[x] !== null).map(x => PARK_MAP[x] || x.toLowerCase());
    const niUrejeno = o.prikl_parkiranje.includes('Ni urejeno');
    if (parkOk.length)
      odst2.push('Parkiranje je urejeno ' + nastejNizko(parkOk) + '.');
    else if (niUrejeno)
      odst2.push('Parkiranje je mogoče v okolici objekta.');
  }

  // ── 11. PRIKLJUČKI ────────────────────────────────────────────
  const prikl = [];
  if (o.prikl_elektrika === 'Da') prikl.push('elektrodistribucijsko omrežje');
  if (o.prikl_vodovod   === 'Da') prikl.push('javni vodovod');
  if (o.prikl_kanal     === 'Da') prikl.push('javno kanalizacijsko omrežje');
  if (o.prikl_plin      === 'Da') prikl.push('plinovodno omrežje');
  if (o.prikl_telekom   === 'Da') prikl.push('telekomunikacijsko omrežje');
  if (prikl.length) {
    const hisaT = (o.vrsta === 'Dvojček' ? 'Hiša' : (o.vrsta ? o.vrsta + ' hiša' : 'Hiša'));
    odst2.push('Objekt je priključen na ' + nastejViso(prikl) + '.');
  }
  if (o.prikl_vodovod === 'Ne' && o.prikl_vodovod_alt && o.prikl_vodovod_alt.length)
    odst2.push('Objekt se oskrbuje z vodo iz ' + nastejNizko(o.prikl_vodovod_alt) + '.');
  if (o.prikl_kanal === 'Ne' && o.prikl_kanal_alt && o.prikl_kanal_alt.length) {
    const kanalSkl = o.prikl_kanal_alt.map(x => ({'Greznica':'greznico','Čistilna naprava':'čistilno napravo','Lovilnik maščob':'lovilnik maščob'}[x] || x.toLowerCase()));
    odst2.push('Odpadna voda se odvaja v ' + nastejNizko(kanalSkl) + '.');
  }

  // ── SESTAVI V 2 ODSTAVKA ──────────────────────────────────────
  const deli = [];
  if (odst1.length) deli.push(odst1.join(' '));
  if (odst2.length) deli.push(odst2.join(' '));
  if (o.posebnosti && o.posebnosti.trim()) deli.push(o.posebnosti.trim());
  return deli.join('\n\n');
}

function kopiraj() {
  navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('opisText').innerText);
  toast('Kopirano!');
}

function posljiEmail() {
  const opis = document.getElementById('opisText').innerText;
  const mail = document.getElementById('emailInput').value.trim();
  if (!mail) { toast('Vpišite email naslov!'); return; }

  // Sestavi povzetek iz G podatkov
  const vrstice = [];
  if (G.naslov)         vrstice.push('Naslov: ' + G.naslov);
  if (G.tip)            vrstice.push('Vrsta: ' + tipL(G.tip));
  if (G.vrsta)          vrstice.push('Tip objekta: ' + G.vrsta);
  if (G.leto_izgradnje) vrstice.push('Leto izgradnje: ' + G.leto_izgradnje);
  if (G.etaznost)       vrstice.push('Etažnost: ' + G.etaznost);
  if (G.nadstropje)     vrstice.push('Nadstropje: ' + G.nadstropje);
  if (G.vseljeno)       vrstice.push('Vseljena: ' + G.vseljeno);
  if (G.vzdrzevano)     vrstice.push('Vzdrževana: ' + G.vzdrzevano);
  if (G.tlaki && G.tlaki.length) vrstice.push('Tlaki: ' + G.tlaki.join(', '));
  if (G.zasteklitev_tip) vrstice.push('Zasteklitev: ' + [G.zasteklitev_tip, G.zasteklitev_okvir].filter(Boolean).join(', '));
  if (G.ogr_prostori && G.ogr_prostori.length) vrstice.push('Ogrevanje: ' + G.ogr_prostori.join(', '));
  if (G.ogrevala && G.ogrevala.length) vrstice.push('Ogrevala: ' + G.ogrevala.join(', '));
  const priklYes = [];
  if (G.prikl_elektrika==='Da') priklYes.push('elektrika');
  if (G.prikl_vodovod==='Da')   priklYes.push('vodovod');
  if (G.prikl_kanal==='Da')     priklYes.push('kanalizacija');
  if (G.prikl_plin==='Da')      priklYes.push('plin');
  if (G.prikl_telekom==='Da')   priklYes.push('telekom');
  if (priklYes.length) vrstice.push('Priključki: ' + priklYes.join(', '));
  if (G.prikl_parkiranje && G.prikl_parkiranje.length) vrstice.push('Parkiranje: ' + G.prikl_parkiranje.join(', '));
  if (G.obnove && G.obnove['_status']) vrstice.push('Obnove: ' + (G.obnove['_status']==='ni_obnovljeno'?'Ni bilo obnovljeno':'Ni podatka'));
  if (G.cena_oglas)    vrstice.push('Cena (oglas): ' + (G.cena_oglas==='ne_povejo'?'ne povejo':G.cena_oglas==='ne_prodaja'?'ne prodaja':G.cena_oglas+' €'));
  if (G.cena_pogodba)  vrstice.push('Cena (pogodba): ' + (G.cena_pogodba==='ne_povejo'?'ne povejo':G.cena_pogodba==='ne_prodaja'?'ne prodaja':G.cena_pogodba+' €'));
  if (G.dokumentacija) vrstice.push('Dokumentacija: ' + G.dokumentacija);
  if (G.datum)         vrstice.push('Datum ogleda: ' + G.datum);

  const povzetek = vrstice.join('\n');
  const telo = 'POVZETEK PODATKOV\n' + '─'.repeat(40) + '\n' + povzetek + '\n\n' + 'BESEDILNI OPIS\n' + '─'.repeat(40) + '\n' + opis;

  const sub = encodeURIComponent('Ogled: '+(G?G.naslov:'')+' · '+(G?G.datum:''));
  location.href = 'mailto:' + mail + '?subject=' + sub + '&body=' + encodeURIComponent(telo);
}

function deliOpis() {
  const opis = document.getElementById('opisText').innerText;
  const naslov = G ? G.naslov : '';
  const datum = G ? G.datum : '';
  const title = 'Ogled: ' + naslov + ' · ' + datum;

  if (navigator.share) {
    navigator.share({ title: title, text: opis })
      .catch(() => {});
  } else {
    // Fallback: kopiraj v clipboard + toast
    if (navigator.clipboard) {
      navigator.clipboard.writeText(opis).then(() => {
        toast('Opis kopiran! Prilepi ga v email.');
      });
    } else {
      toast('Kopiraj opis ročno in pošlji po emailu.');
    }
  }
}

let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Prikaži banner samo če ni nameščeno
  if(!window.matchMedia('(display-mode: standalone)').matches) {
    document.getElementById('installBanner').classList.remove('hidden');
  }
});

function installPWA() {
  if(deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      closeBanner();
    });
  }
}

function closeBanner() {
  document.getElementById('installBanner').classList.add('hidden');
  localStorage.setItem('nai_banner_closed','1');
}

// iOS navodila (Safari ne podpira beforeinstallprompt)
function checkiOS() {
  const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone = window.navigator.standalone;
  const closed = localStorage.getItem('nai_banner_closed');
  if(isIOS && !isStandalone && !closed) {
    const b = document.getElementById('installBanner');
    b.classList.remove('hidden');
    document.querySelector('.ib-title').textContent = '📱 Namesti na domači zaslon';
    document.querySelector('.ib-sub').textContent = 'Pritisni Deli → "Dodaj na začetni zaslon"';
    document.getElementById('installBtn').style.display='none';
  }
}

// TOAST
// ═══════════════════════
function toast(m) {
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
