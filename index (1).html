<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NAI Ogled">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#AF2D37">
<title>NAI Ogled</title>
<script>
const manifestData = {
  name: "NAI Significa – Ogled",
  short_name: "NAI Ogled",
  start_url: ".",
  display: "standalone",
  background_color: "#EBEBEB",
  theme_color: "#AF2D37",
  orientation: "portrait",
  icons: [{src:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg==",sizes:"192x192",type:"image/png"}]
};
const blob = new Blob([JSON.stringify(manifestData)],{type:'application/json'});
document.write('<link rel="manifest" href="'+URL.createObjectURL(blob)+'">');
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button{color:inherit;-webkit-appearance:none;appearance:none;}
a{color:inherit;}
:root{
  --red:#AF2D37;
  --black:#1A1A1A;
  --gray:#6D7276;
  --light:#EBEBEB;
  --white:#FFFFFF;
  --border:#D4D4D4;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--light);color:var(--black);
  min-height:100vh;
  padding-bottom:calc(88px + env(safe-area-inset-bottom));
}

/* HEADER */
header{
  background:var(--red);
  position:sticky;top:0;z-index:100;
  padding-top:env(safe-area-inset-top);
  box-shadow:0 2px 8px rgba(175,45,55,0.3);
}
.hdr-main{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;}
.hdr-logo{font-size:13px;font-weight:800;color:white;text-transform:uppercase;letter-spacing:2px;}
.hdr-btn{background:rgba(255,255,255,0.18);border:none;color:white;border-radius:4px;padding:7px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:0.8px;}
.ctx-bar{background:rgba(0,0,0,0.18);padding:8px 16px;display:none;align-items:center;gap:10px;border-top:1px solid rgba(255,255,255,0.12);}
.ctx-bar.show{display:flex;}
.ctx-bar img{width:18px;height:18px;object-fit:contain;opacity:.9;}
.ctx-bar .ctx-naslov{font-size:13px;font-weight:600;color:rgba(255,255,255,.92);flex:1;}
.ctx-bar .ctx-datum{font-size:11px;color:rgba(255,255,255,.55);}
.prog-bar{height:2px;background:rgba(255,255,255,.2);}
.prog-fill{height:100%;background:white;transition:width .3s;}

/* PAGES */
.page{display:none;}.page.active{display:block;}

/* INSTALL BANNER */
.install-banner{
  background:var(--black);color:white;
  padding:12px 16px;display:flex;align-items:center;gap:12px;
}
.install-banner.hidden{display:none;}
.ib-text{flex:1;}
.ib-title{font-size:13px;font-weight:700;}
.ib-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;}
.ib-btn{background:var(--red);border:none;color:white;border-radius:4px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.ib-close{background:transparent;border:none;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;}

/* LIST */
.list-top{padding:14px 16px 8px;}
.list-top h2{font-size:19px;font-weight:800;letter-spacing:-.3px;}
.list-top p{font-size:13px;color:var(--gray);margin-top:4px;}

.storage-row{
  margin:0 16px 12px;padding:12px 14px;
  background:var(--white);border-radius:6px;border:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.stor-bar-wrap{flex:1;}
.stor-lbl{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.stor-bar{height:4px;background:var(--light);border-radius:2px;overflow:hidden;}
.stor-fill{height:100%;background:var(--red);border-radius:2px;transition:width .3s;}
.stor-cnt{font-size:12px;font-weight:800;color:var(--black);white-space:nowrap;}

.date-group{margin:0 16px 16px;}
.date-hdr{
  font-size:10px;font-weight:800;color:var(--gray);
  text-transform:uppercase;letter-spacing:1.2px;
  padding:0 0 8px;display:flex;align-items:center;gap:8px;
}
.date-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
.date-cnt{
  background:var(--border);color:var(--gray);
  border-radius:3px;padding:2px 7px;font-size:10px;font-weight:800;
}

.ogled-card{background:var(--white);border-radius:6px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:8px;}
.ogled-top{padding:14px 16px;display:flex;align-items:center;gap:12px;}
.ogled-ico{width:38px;height:38px;object-fit:contain;opacity:.8;flex-shrink:0;}
.ogled-info{flex:1;min-width:0;}
.ogled-title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ogled-meta{font-size:12px;color:var(--gray);margin-top:2px;}
.ogled-badge{background:var(--red);color:white;border-radius:3px;padding:3px 7px;font-size:10px;font-weight:800;text-transform:uppercase;flex-shrink:0;}
.ogled-actions{display:flex;border-top:1px solid var(--border);}
.act-btn{flex:1;border:none;background:transparent;padding:11px 6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--black);text-transform:uppercase;letter-spacing:.5px;}
.act-btn:not(:last-child){border-right:1px solid var(--border);}
.act-btn.r{color:var(--red);}
.act-btn.muted{color:var(--gray);}

.empty-state{text-align:center;padding:60px 30px;}
.empty-state p{font-size:15px;color:var(--gray);line-height:1.8;}

/* FORM */
.form-body{padding-bottom:100px;}
.step-head{padding:16px 16px 6px;}
.step-head h2{font-size:19px;font-weight:800;letter-spacing:-.3px;}
.step-head p{font-size:13px;color:var(--gray);margin-top:3px;line-height:1.4;}

.card{background:var(--white);margin:0 12px 8px;border-radius:6px;border:1px solid var(--border);padding:13px 14px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.card-lbl{font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.card-lbl::before{content:'';width:2px;height:12px;background:var(--red);border-radius:2px;flex-shrink:0;}

.field{margin-bottom:16px;}
.field:last-child{margin-bottom:0;}
.field>label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}

input[type=text],input[type=email],select,textarea{
  width:100%;background:var(--light);border:1.5px solid var(--border);
  border-radius:5px;padding:11px 12px;font-family:inherit;
  font-size:15px;color:var(--black);outline:none;-webkit-appearance:none;
  transition:border-color .15s,background .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--red);background:var(--white);}
textarea{resize:none;line-height:1.6;}

/* TIP ROWS */
.tip-selector{display:flex;flex-direction:column;gap:10px;margin:0 16px 12px;}
.tip-row{
  background:var(--red);border:2px solid var(--red);
  border-radius:8px;display:flex;align-items:center;gap:12px;
  padding:14px 14px;cursor:pointer;transition:all .12s;
  box-shadow:0 2px 8px rgba(175,45,55,0.25);
}
.tip-row:active{transform:scale(.97);opacity:.9;}
.tip-ico{width:40px;height:40px;object-fit:contain;flex-shrink:0;}
.tip-text{flex:1;}
.tip-name{font-size:16px;font-weight:800;letter-spacing:-.2px;color:white;}

.tip-arr{color:rgba(255,255,255,.6);font-size:22px;font-weight:300;}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{background:var(--light);border:1.5px solid var(--border);border-radius:5px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;user-select:none;transition:all .12s;color:var(--black);-webkit-appearance:none;}
.chip.on{background:var(--red);border-color:var(--red);color:white;}
.chip.nz{background:var(--gray);border-color:var(--gray);color:white;}
.chips.sm .chip{padding:7px 11px;font-size:12px;}
.chip-input{
  background:var(--light);border:1.5px dashed var(--border);
  border-radius:5px;padding:10px 14px;font-size:14px;font-weight:600;
  font-family:inherit;color:var(--black);outline:none;
  width:110px;transition:all .15s;
}
.chip-input:focus,.chip-input.active{
  border-color:var(--red);border-style:solid;
  background:var(--white);width:140px;
}
.divider{height:1px;background:var(--border);margin:12px 0;}

/* NAV */
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-top:1px solid var(--border);
  padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex;gap:10px;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);z-index:100;
}
.btn-back{background:var(--light);border:none;border-radius:5px;padding:12px 16px;font-size:12px;font-weight:700;cursor:pointer;color:var(--gray);font-family:inherit;text-transform:uppercase;letter-spacing:.5px;}
.btn-fwd{flex:1;background:var(--red);border:none;border-radius:5px;padding:12px;font-size:13px;font-weight:800;color:white;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:1px;}
.btn-fwd:active{opacity:.88;}
.btn-primary{display:block;width:100%;background:var(--red);color:white;border:none;border-radius:5px;padding:16px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:1px;}
.btn-ghost{width:100%;background:transparent;border:1.5px solid var(--border);border-radius:5px;padding:14px;font-size:13px;font-weight:700;color:var(--gray);cursor:pointer;font-family:inherit;text-transform:uppercase;}
.hidden{display:none!important;}

/* VAL ERR */
.val-err{
  background:#FDECEA;border-left:4px solid var(--red);
  border-radius:0 6px 6px 0;padding:13px 16px;
  margin:12px 16px;font-size:14px;color:var(--red);
  font-weight:700;display:none;
  box-shadow:0 2px 8px rgba(175,45,55,0.15);
}
.val-err.show{display:flex;align-items:center;gap:10px;}
.val-err.show::before{content:'!';width:22px;height:22px;background:var(--red);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;}
.naslov-hint{font-size:12px;color:var(--gray);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.naslov-hint.filled{color:var(--red);font-weight:600;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .4s ease;}

/* OPIS */
.opis-card{background:var(--white);margin:0 16px 12px;border-radius:6px;border:1px solid var(--border);overflow:hidden;}
.opis-hdr{background:var(--red);color:white;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;}
.btn-copy{background:rgba(255,255,255,.2);border:none;border-radius:3px;color:white;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.opis-text{padding:18px;font-size:15px;line-height:1.85;color:var(--black);white-space:pre-wrap;min-height:80px;}
.email-sec{padding:0 16px 24px;}
.email-sec label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.btn-send{width:100%;background:var(--red);border:none;border-radius:5px;padding:15px;font-size:14px;font-weight:800;color:white;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}

/* TOAST */
/* PROSTORI */
.etaza-card{background:var(--white);margin:0 8px 8px;border-radius:6px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.etaza-hdr{background:var(--black);color:white;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;}
.etaza-naziv{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;}
.etaza-skupaj{font-size:11px;color:rgba(255,255,255,.55);font-weight:600;}
.prostori-grid{padding:6px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.prostor-item{background:var(--white);border:1.5px solid transparent;border-radius:6px;padding:4px 2px 3px;display:flex;flex-direction:column;gap:2px;transition:border-color .15s;min-width:0;overflow:hidden;box-sizing:border-box;}
.prostor-item.active{border-color:transparent;background:var(--light);}
.prostor-naziv{font-size:12px;font-weight:700;color:var(--black);text-align:center;line-height:1.2;word-break:break-word;padding:0 2px;}
.prostor-ctrl{display:flex;align-items:center;justify-content:center;gap:0;width:100%;}
.prostor-btn{width:18px;height:22px;border:none;border-radius:4px;background:var(--border);font-size:13px;font-weight:700;cursor:pointer;color:var(--black);display:flex;align-items:center;justify-content:center;line-height:1;font-family:inherit;transition:all .1s;flex-shrink:0;}
.prostor-btn:active{background:var(--red);color:white;}
.prostor-btn.minus{border-radius:4px 0 0 4px;}
.prostor-btn.plus{border-radius:0 4px 4px 0;background:var(--border);color:var(--black);}
.prostor-btn.plus:active{background:#BBBFC2;color:var(--black);}
.prostor-st{width:22px;flex-shrink:0;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--black);background:white;border-top:1.5px solid var(--border);border-bottom:1.5px solid var(--border);}
.prostor-item.active .prostor-st{color:var(--black);font-weight:900;}
.neizd-grid{padding:10px 14px 12px;display:flex;flex-wrap:wrap;gap:6px;}
.prostor-drugo{background:transparent!important;border:none!important;padding:8px 4px 4px!important;}



.chip.multi-on{background:var(--red);border-color:var(--red);color:white;}
/* OBNOVE TABLE */
.obnova-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);gap:10px;}
.obnova-row:last-child{border-bottom:none;}
.obnova-ime{font-size:13px;font-weight:600;color:var(--black);padding-left:4px;}
.obnova-leto{width:64px;min-width:64px;max-width:64px;flex-shrink:0;background:var(--light);border:1.5px solid var(--border);border-radius:5px;padding:7px 6px;font-size:14px;font-weight:700;text-align:center;font-family:inherit;outline:none;-webkit-appearance:none;}
.obnova-leto:focus{border-color:var(--red);background:white;}
.obnova-leto.filled{border-color:var(--red);color:var(--red);}
/* CONDITIONAL FIELDS */
.cond-fields{margin-top:10px;padding:12px;background:rgba(175,45,55,.04);border-radius:5px;border:1px solid rgba(175,45,55,.15);}
.cond-fields .card-lbl{font-size:10px;margin-bottom:8px;}
/* CENA */
.cena-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.cena-row .chip{font-size:13px;padding:9px 13px;}
.sekcija-lbl{font-size:11px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;}
.sekcija-lbl:first-child{margin-top:0;}



/* CONDITIONAL FIELDS */

.cond-fields .card-lbl{font-size:10px;margin-bottom:8px;}
/* CENA */

.cena-row .chip{font-size:13px;padding:9px 13px;}

.sekcija-lbl:first-child{margin-top:0;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--black);color:white;padding:10px 20px;border-radius:5px;font-size:12px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.toast.show{opacity:1;}

/* NEIZDELANO — enoten stil */
.neizd-chip{background:var(--light);border:1.5px solid var(--border);border-radius:5px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--black);transition:all .12s;-webkit-appearance:none;}
.neizd-chip.on{background:var(--red)!important;border-color:var(--red)!important;color:white!important;}
.etaza-hdr.neizd{background:var(--black)!important;}
</style>
</head>
<body>

<header>
  <div class="hdr-main">
    <span class="hdr-logo">NAI Significa</span>
    <button class="hdr-btn hidden" id="hdrBack" onclick="showList()">← Ogledi</button>
  </div>
  <div class="ctx-bar" id="ctxBar">
    <img id="ctxIco" src="">
    <span class="ctx-naslov" id="ctxNaslov"></span>
    <span class="ctx-datum" id="ctxDatum"></span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
</header>

<!-- PWA INSTALL BANNER -->
<div class="install-banner hidden" id="installBanner">
  <div class="ib-text">
    <div class="ib-title">&#128241; Namesti kot aplikacijo</div>
    <div class="ib-sub">Deluje brez interneta · Ikona na domačem zaslonu</div>
  </div>
  <button class="ib-btn" id="installBtn" onclick="installPWA()">Namesti</button>
  <button class="ib-close" onclick="closeBanner()">&#215;</button>
</div>

<!-- ══ LIST ════════════════════ -->
<div class="page active" id="pageList">
  <div class="list-top">
    <h2>Ogledi nepremičnin</h2>
    <p id="listSub">Nalagam...</p>
  </div>
  <div style="padding:0 16px 10px;">
    <button class="btn-primary" onclick="zacniNov()">+ Nov ogled</button>
  </div>
  <div class="storage-row">
    <div class="stor-bar-wrap">
      <div class="stor-lbl">Shranjeni ogledi</div>
      <div class="stor-bar"><div class="stor-fill" id="storFill" style="width:0%"></div></div>
    </div>
    <span class="stor-cnt" id="storCnt">0 / 100</span>
  </div>
  <div id="listWrap" style="padding:4px 0 8px;"></div>
</div>

<!-- ══ FORM ════════════════════ -->
<div class="page" id="pageForm">
  <div class="val-err" id="valErr"></div>
  <div class="form-body" id="formBody"></div>
</div>

<!-- ══ OPIS ════════════════════ -->
<div class="page" id="pageOpis">
  <div class="step-head">
    <h2>Ogled zaključen</h2>
    <p>Preverite podatke in pošljite opis.</p>
  </div>

  <!-- Povzetek kartica -->
  <div class="card" id="opisSummary" style="margin-bottom:12px;">
    <div class="card-lbl">Povzetek ogleda</div>
    <div id="sumContent"></div>
  </div>

  <!-- Opis -->
  <div class="opis-card">
    <div class="opis-hdr">
      Besedilni opis
      <div style="display:flex;gap:6px;">
        <button class="btn-copy" onclick="kopiraj()">Kopiraj</button>
        <button class="btn-copy" onclick="resetOpis()" style="background:rgba(255,255,255,0.1);">Ponastavi</button>
      </div>
    </div>
    <div class="opis-text" id="opisText" contenteditable="true"></div>
  </div>

  <!-- Email -->
  <div class="email-sec">
    <label>Pošlji opis na email</label>
    <input type="text" inputmode="email" id="emailInput"
      placeholder="vpišite email naslov..."
      style="margin-bottom:10px;width:100%;display:block;background:#fff;border:2px solid var(--border);border-radius:6px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;">
    <button class="btn-send" onclick="posljiEmail()">&#9993; Pošlji opis</button>
    <button class="btn-ghost" style="margin-top:8px;" onclick="showList()">← Nazaj na seznam</button>
  </div>
</div>
  <button class="btn-fwd" id="btnFwd" onclick="nextStep()">Naprej →</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════
// ICONS

// ═══════════════════════
// STORAGE — datumske mape, max 100
// ═══════════════════════
const SK = 'nai_v3';
const MAX = 100;

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function fmtDatum(k) {
  const [y,m,d] = k.split('-');
  return d + '. ' + m + '. ' + y;
}

const db = {
  _cache: null,

  load() {
    if (this._cache) return this._cache;
    try { this._cache = JSON.parse(localStorage.getItem(SK)||'{}'); }
    catch(e) { this._cache = {}; }
    return this._cache;
  },

  save(d) {
    this._cache = d;
    localStorage.setItem(SK, JSON.stringify(d));
  },

  shrani(o) {
    const d = this.load();
    const k = o.datum_key || todayKey();
    if (!d[k]) d[k] = [];
    const i = d[k].findIndex(x => x.id === o.id);
    if (i > -1) {
      d[k][i] = o;
    } else {
      const skupaj = Object.values(d).reduce((s,a)=>s+a.length, 0);
      if (skupaj >= MAX) {
        const oldest = Object.keys(d).sort()[0];
        if (d[oldest]) {
          d[oldest].shift();
          if (!d[oldest].length) delete d[oldest];
        }
      }
      d[k].push(o);
    }
    this.save(d);
  },

  izbrisi(id) {
    const d = this.load();
    Object.keys(d).forEach(k => {
      d[k] = d[k].filter(o => o.id !== id);
      if (!d[k].length) delete d[k];
    });
    this.save(d);
  },

  poDateh() {
    const d = this.load();
    return Object.keys(d).sort().reverse().map(k => ({
      key: k, label: fmtDatum(k), ogledi: [...d[k]].reverse()
    }));
  },

  skupaj() { return Object.values(this.load()).reduce((s,a)=>s+a.length, 0); },

  // O(1) lookup z indeksom namesto O(n) iskanja
  najdi(id) {
    const d = this.load();
    for (const k of Object.keys(d)) {
      const o = d[k].find(x => x.id === id);
      if (o) return o;
    }
    return null;
  }
};

// STATE
// ═══════════════════════
let G = null, stepIdx = 0, steps = [];

function newG() {
  const k = todayKey();
  return { id: Date.now().toString(), datum_key: k, datum: fmtDatum(k),
           naslov: '', tip: '', leto_izgradnje: '', vrsta: '', vseljeno: '', vzdrzevano: '',
           etaznost: '',
           // stanovanje / svh
           nadstropje: '', dvigalo: '', st_stanovanj: '',
           orient_VSE: false, orient_S: false, orient_J: false, orient_V: false, orient_Z: false, orient_SZ: false, orient_SV: false, orient_JV: false, orient_JZ: false,
           // poslovni
           povrsina: '', prezracevanje: '',
           prostori: { K:{}, P:{}, '1N':{}, '2N':{}, M:{}, STA:{}, POS:{} },
           neizdelano: [], neizd_drugo: '',
           tlaki: [], tlaki_drugo: '', zasteklitev_tip: '', zasteklitev_okvir: '',
           ogr_prostori: [], ogr_prostori_drugo: '', ogr_voda: [], ogr_voda_drugo: '',
           ogrevala: [], ogrevala_drugo: '',
           opombe_prostori: '',
           prikl_elektrika: '', prikl_vodovod: '', prikl_vodovod_alt: [],
           prikl_kanal: '', prikl_kanal_alt: [],
           prikl_plin: '', prikl_telekom: '', prikl_parkiranje: [],
           obnove: {},
           cena_oglas: '', cena_pogodba: '', dokumentacija: '',
           posebnosti: '' };
}

function buildSteps() {
  steps = ['naslov_tip'];
  if (G.tip === 'hisa')        steps.push('hisa_vse','hisa_prostori','hisa_instalacije','hisa_prikljucki','hisa_obnove','hisa_zakljucek');
  if (G.tip === 'stan_v_hisi') steps.push('svh_vse','svh_prostori','svh_instalacije','svh_prikljucki','svh_obnove','svh_zakljucek');
  if (G.tip === 'stanovanje')  steps.push('sta_vse','sta_prostori','sta_instalacije','sta_obnove','sta_zakljucek');
  if (G.tip === 'poslovni')    steps.push('pos_vse','pos_prostori','pos_instalacije','pos_prikljucki','pos_zakljucek');
}

// ═══════════════════════
// ROUTING
// ═══════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const isForm = id === 'pageForm';
  document.getElementById('navBar').classList.toggle('hidden', !isForm);
  document.getElementById('hdrBack').classList.toggle('hidden', id === 'pageList');
  // Na opis strani gumb kaže "← Nazaj"
  if (id === 'pageOpis') {
    const btn = document.getElementById('hdrBack');
    btn.classList.remove('hidden');
    btn.textContent = '← Nazaj';
  } else if (id === 'pageForm') {
    document.getElementById('hdrBack').textContent = '← Ogledi';
  }
  window.scrollTo(0,0);
}

function updateCtx() {
  const bar = document.getElementById('ctxBar');
  if (!G || !G.naslov || stepIdx === 0) { bar.classList.remove('show'); return; }
  document.getElementById('ctxIco').src = ICO[G.tip] || '';
  document.getElementById('ctxNaslov').textContent = G.naslov;
  document.getElementById('ctxDatum').textContent = G.datum;
  bar.classList.add('show');
}

function updateProg() {
  const pct = steps.length ? Math.round(((stepIdx+1)/steps.length)*100) : 0;
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('btnBack').classList.toggle('hidden', stepIdx === 0);
  document.getElementById('btnFwd').textContent =
    stepIdx >= steps.length-1 ? 'Generiraj opis →' : 'Naprej →';
}

function updateStorage() {
  const n = db.skupaj(), pct = Math.round(n/MAX*100);
  document.getElementById('storFill').style.width = pct + '%';
  document.getElementById('storFill').style.background = pct > 80 ? '#c0392b' : 'var(--red)';
  document.getElementById('storCnt').textContent = n + ' / ' + MAX;
}

// ═══════════════════════
// LIST
// ═══════════════════════
function showList() {
  const grupe = db.poDateh();
  const n = db.skupaj();
  document.getElementById('listSub').textContent =
    n ? n + ' ogledov · ' + grupe.length + ' dni' : 'Ni shranjenih ogledov';
  updateStorage();

  const c = document.getElementById('listWrap');
  if (!n) {
    c.innerHTML = '<div class="empty-state"><p>Pritisnite <b>+ Nov ogled</b><br>za začetek.</p></div>';
  } else {
    c.innerHTML = grupe.map(g => `
      <div class="date-group">
        <div class="date-hdr">${g.label}<span class="date-cnt">${g.ogledi.length}</span></div>
        ${g.ogledi.map(o => `
          <div class="ogled-card">
            <div class="ogled-top">
              <img class="ogled-ico" src="${ICO_DARK[o.tip]||''}" alt="">
              <div class="ogled-info">
                <div class="ogled-title">${o.naslov||'Brez naslova'}</div>
                <div class="ogled-meta">${tipL(o.tip)}${o.vrsta?' · '+o.vrsta:''}${o.leto_izgradnje?' · '+o.leto_izgradnje:''}</div>
              </div>
              <span class="ogled-badge">${tipS(o.tip)}</span>
            </div>
            <div class="ogled-actions">
              <button class="act-btn" onclick="uredi('${o.id}')">Uredi</button>
              <button class="act-btn r" onclick="prikaziOpis('${o.id}')">Opis / Pošlji</button>
              <button class="act-btn muted" onclick="del('${o.id}')">Izbriši</button>
            </div>
          </div>`).join('')}
      </div>`).join('');
  }
  showPage('pageList');
}

const tipL = t => ({stanovanje:'Stanovanje',stan_v_hisi:'Stan. v hiši',hisa:'Hiša',poslovni:'Poslovni objekt'}[t]||'—');
const tipS = t => ({stanovanje:'STAN',stan_v_hisi:'S.HIŠA',hisa:'HIŠA',poslovni:'POSL.'}[t]||'?');

function zacniNov() { db._cache=null; G=newG(); stepIdx=0; buildSteps(); renderStep(); showPage('pageForm'); }
function uredi(id) {
  const o = db.najdi(id); if(!o) return;
  G = {...o}; stepIdx=0; buildSteps(); renderStep(); showPage('pageForm');
}
function prikaziOpis(id) {
  const o = db.najdi(id); if(!o) return;
  G = {...o};
  document.getElementById('opisText').innerText = genOpis(G);
  showPage('pageOpis');
}
function del(id) {
  if(confirm('Izbrisati ta ogled?')) { db.izbrisi(id); showList(); toast('Ogled izbrisan.'); }
}

// ═══════════════════════
// FORM
// ═══════════════════════
function renderStep() {
  document.getElementById('valErr').classList.remove('show');
  document.getElementById('formBody').innerHTML = stepHTML(steps[stepIdx]);
  updateProg(); updateCtx();
  // Reset auto-advance timer after render
  clearTimeout(autoTimer);
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function clearValErr() {
  document.getElementById('valErr').classList.remove('show');
  const hint = document.getElementById('naslovHint');
  if (hint) {
    if (G.naslov.trim()) {
      hint.textContent = 'Zdaj izberite vrsto nepremičnine ↓';
      hint.classList.add('filled');
    } else {
      hint.textContent = 'Vnesite naslov, nato izberite vrsto nepremičnine.';
      hint.classList.remove('filled');
    }
  }
}

function chipsHTML(field, vals) {
  const filtered = vals.filter(v => v !== 'Ni znano');
  const chips = filtered.map(v => {
    const on = G[field]===v;
    return `<button class="chip${on?' on':''}" onclick="setF('${field}','${v}',this)">${v}</button>`;
  }).join('');
  const isCustom = G[field] && !filtered.includes(G[field]);
  return chips + `<input type="text" class="chip-input${isCustom?' active':''}"
    placeholder="Drugo..." value="${esc(isCustom?G[field]:'')}"
    oninput="setCustom('${field}',this)"
    onfocus="clearChips('${field}',this)">`;
}

// Multi-select chips (array field)
function multiChipsHTML(field, vals) {
  const arr = G[field] || [];
  const chips = vals.map(v => {
    const on = arr.includes(v);
    return '<button class="chip ' + (on?'multi-on':'') + '"' +
      ' data-field="' + field + '" data-val="' + esc(v) + '"' +
      ' onclick="togMultiData(this)">' + v + '</button>';
  }).join('');
  const customVal = G[field + '_drugo'] || '';
  return chips +
    '<input type="text" class="chip-input ' + (customVal?'active':'') + '"' +
    ' placeholder="Drugo..."' +
    ' value="' + esc(customVal) + '"' +
    ' data-field="' + field + '"' +
    ' oninput="setMultiDrugo(this)">';
}

function renderDrugRow(letoClass, letoVal, imeVal) {
  const div = document.createElement('div');
  div.className = 'obnova-row';

  const imeInp = document.createElement('input');
  imeInp.type = 'text';
  imeInp.placeholder = 'Drugo';
  imeInp.value = imeVal;
  imeInp.style.cssText = 'flex:1;font-size:13px;background:var(--light);border:1.5px solid var(--border);border-radius:5px;padding:6px 10px;font-family:inherit;outline:none;color:var(--black);';
  imeInp.onfocus = function() { this.style.borderColor='var(--red)'; };
  imeInp.onblur  = function() { this.style.borderColor=''; };
  imeInp.oninput = function() { setObnovaDrugo('ime', this.value); };

  const letoInp = document.createElement('input');
  letoInp.type = 'text'; letoInp.inputMode = 'numeric'; letoInp.maxLength = 4;
  letoInp.className = 'obnova-leto ' + letoClass;
  letoInp.placeholder = 'leto'; letoInp.value = letoVal;
  letoInp.oninput = function() { setObnovaDrugo('leto', this.value); };

  div.appendChild(imeInp);
  div.appendChild(letoInp);
  return div.outerHTML;
}

function setObnovaStatus(val, el) {
  if (!G.obnove) G.obnove = {};
  const curr = G.obnove['_status'] || '';
  if (curr === val) {
    delete G.obnove['_status'];
    el.classList.remove('on');
  } else {
    G.obnove['_status'] = val;
    el.closest('.chips').querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    el.classList.add('on');
    // Auto-naprej po 400ms
    setTimeout(() => { if (G.obnove && G.obnove['_status'] === val) nextStep(); }, 200);
  }
}

function setObnova(key, val) {
  if (!G.obnove) G.obnove = {};
  if (!G.obnove[key]) G.obnove[key] = {};
  G.obnove[key].leto = val;
  const el = document.querySelector('[data-key="' + key + '"]');
  if (el) el.classList.toggle('filled', val.length > 0);
}

function setObnovaDrugo(subkey, val) {
  if (!G.obnove) G.obnove = {};
  if (!G.obnove['drugo']) G.obnove['drugo'] = {};
  G.obnove['drugo'][subkey] = val;
}

function setCena(field, val, el) {
  G[field] = val;
  const card = el.closest('.card');
  if (card) { const inp = card.querySelector('input[type=text][inputmode=numeric]'); if(inp) inp.value=''; }
  el.closest('.cena-row').querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}

function setCenaNum(field, inp) {
  G[field] = inp.value;
  // Deselect chips
  const row = inp.previousElementSibling;
  if (row) row.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
}

function togMulti(field, val, el) {
  if (!G[field]) G[field] = [];
  const i = G[field].indexOf(val);
  if (i > -1) { G[field].splice(i,1); el.classList.remove('multi-on'); }
  else         { G[field].push(val);  el.classList.add('multi-on'); }
}

function setMultiDrugo(inp) {
  const field = inp.dataset.field;
  if (field) G[field + '_drugo'] = inp.value;
  inp.classList.toggle('active', inp.value.length > 0);
}

function togMultiData(el) {
  const field = el.dataset.field;
  const val   = el.dataset.val;
  togMulti(field, val, el);
}

function setCustom(field, inp) {
  G[field] = inp.value;
  inp.classList.toggle('active', inp.value.length > 0);
  inp.closest('.chips').querySelectorAll('.chip').forEach(c => c.classList.remove('on','nz'));
  autoCheck();
}

function clearChips(field, inp) {
  inp.closest('.chips').querySelectorAll('.chip').forEach(c => c.classList.remove('on','nz'));
}

// INTERACTIONS
// ═══════════════════════
function selTip(tip, el) {
  // Preveri naslov PRED prehodom
  if (!G.naslov.trim()) {
    const inp = document.getElementById('fNaslov');
    if (inp) {
      inp.focus();
      inp.classList.add('shake');
      setTimeout(() => inp.classList.remove('shake'), 500);
    }
    showValErr('Najprej vnesite naslov nepremičnine.');
    return;
  }
  G.tip = tip;
  buildSteps();
  setTimeout(() => { stepIdx=1; if(stepIdx>=steps.length){finishForm();}else{renderStep();} }, 260);
}

function showValErr(msg) {
  const el = document.getElementById('valErr');
  el.textContent = msg;
  el.classList.add('show');
  el.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function setF(field, val, el) {
  G[field] = val;
  el.closest('.chips').querySelectorAll('.chip').forEach(c => c.classList.remove('on','nz'));
  el.classList.add('on');
  const inp = el.closest('.chips').querySelector('.chip-input');
  if (inp) { inp.value = ''; inp.classList.remove('active'); }
  if (field === 'prikl_vodovod') toggleCondFields('cond-vodovod', val === 'Ne');
  if (field === 'prikl_kanal')   toggleCondFields('cond-kanal',   val === 'Ne');
  autoCheck();
}

function togMultiData(el) {
  const field = el.dataset.field;
  const val   = el.dataset.val;
  togMulti(field, val, el);
}

function setCustom(field, inp) {
  G[field] = inp.value;
  inp.classList.toggle('active', inp.value.length > 0);
  inp.closest('.chips').querySelectorAll('.chip').forEach(c => c.classList.remove('on','nz'));
  autoCheck();
}

  inp.closest('.chips').querySelectorAll('.chip').forEach(c => c.classList.remove('on','nz'));

      s === 'svh_obnove' || s === 'sta_obnove' ||
      s === 'svh_zakljucek' || s === 'sta_zakljucek' || s === 'pos_zakljucek') {

  return '';
}

// ═══════════════════════
// INTERACTIONS
// ═══════════════════════
function selTip(tip, el) {
  // Preveri naslov PRED prehodom
  if (!G.naslov.trim()) {
    const inp = document.getElementById('fNaslov');
    if (inp) {
      inp.focus();
      inp.classList.add('shake');
      setTimeout(() => inp.classList.remove('shake'), 500);
    }
    showValErr('Najprej vnesite naslov nepremičnine.');
    return;
  }
  G.tip = tip;
  buildSteps();
  setTimeout(() => { stepIdx=1; if(stepIdx>=steps.length){finishForm();}else{renderStep();} }, 260);
}

function showValErr(msg) {
  const el = document.getElementById('valErr');
  el.textContent = msg;
  el.classList.add('show');
  el.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function setF(field, val, el) {
  G[field] = val;
  el.closest('.chips').querySelectorAll('.chip').forEach(c => c.classList.remove('on','nz'));
  el.classList.add('on');
  const inp = el.closest('.chips').querySelector('.chip-input');
  if (inp) { inp.value = ''; inp.classList.remove('active'); }
  if (field === 'prikl_vodovod') toggleCondFields('cond-vodovod', val === 'Ne');
  if (field === 'prikl_kanal')   toggleCondFields('cond-kanal',   val === 'Ne');
  autoCheck();
}

// ─── AUTO-ADVANCE ────────────────────────────────────────────────
let autoTimer = null;

function autoCheck() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => {
    if (isStepComplete()) {
      requestAnimationFrame(() => { nextStep(); });
    }
  }, 600);
}

function togOrient(smer, el) {
  if (smer === 'VSE') {
    const on = !G.orient_VSE;
    ['VSE','S','J','V','Z','SZ','SV','JV','JZ'].forEach(k => { G['orient_'+k] = on; });
    el.closest('.chips').querySelectorAll('.chip').forEach(c => c.classList.toggle('on', on));
  } else {
    G['orient_'+smer] = !G['orient_'+smer];
    el.classList.toggle('on', G['orient_'+smer]);
    // Odznači VSE če katerakoli smer ni označena
    const allOn = ['S','J','V','Z','SZ','SV','JV','JZ'].every(k => G['orient_'+k]);
    G.orient_VSE = allOn;
    const vseBtn = el.closest('.chips').querySelector('.chip:first-child');
    if (vseBtn) vseBtn.classList.toggle('on', allOn);
  }
}

function setCena(field, val, el) {
  if (el) {
    el.closest('.card').querySelectorAll('.cena-row .chip').forEach(c => c.classList.remove('on'));
    el.classList.add('on');
    G[field] = val;
    el.closest('.card').querySelectorAll('input[type=text]').forEach(i => i.value = '');
  } else {
    G[field] = val;
  }
}

function isStepComplete() {
  const s = steps[stepIdx];

  // Zaključek in prostori in obnove — vedno ročno (posebnosti so neobvezne)
  const manualOnly = [
    'hisa_zakljucek', 'hisa_prostori', 'hisa_obnove',
    'svh_zakljucek', 'svh_prostori', 'svh_obnove',
    'sta_prostori', 'sta_obnove', 'sta_zakljucek',
    'pos_zakljucek', 'pos_prostori'
  ];
  if (manualOnly.includes(s)) return false;

  if (s === 'hisa_vse') {
    if (!G.vrsta || !G.vseljeno) return false;
    if (!G.leto_izgradnje) return false;
    const leto = parseInt(G.leto_izgradnje);
    const novogradnja = !isNaN(leto) && leto >= 2010;
    if (!novogradnja && !G.vzdrzevano) return false;
    return true;
  }


  if (s === 'hisa_prikljucki' || s === 'svh_prikljucki' || s === 'pos_prikljucki') {
    if (!G.prikl_elektrika || !G.prikl_vodovod || !G.prikl_kanal || !G.prikl_plin || !G.prikl_telekom) return false;
    if (!G.prikl_parkiranje || !G.prikl_parkiranje.length) return false;
    return true;
  }

    if (s === 'hisa_instalacije' || s === 'svh_instalacije' || s === 'sta_instalacije' || s === 'pos_instalacije') {
    if ((!G.tlaki||!G.tlaki.length) && !G.tlaki_drugo) return false;
    if (!G.zasteklitev_tip || !G.zasteklitev_okvir) return false;
    if ((!G.ogr_prostori||!G.ogr_prostori.length) && !G.ogr_prostori_drugo) return false;
    if ((!G.ogr_voda||!G.ogr_voda.length) && !G.ogr_voda_drugo) return false;
    if ((!G.ogrevala||!G.ogrevala.length) && !G.ogrevala_drugo) return false;
    return true;
  }

  if (s === 'svh_vse') {
    if (!G.leto_izgradnje || !G.vseljeno || !G.nadstropje || !G.dvigalo || !G.st_stanovanj) return false;
    const letoSVH = parseInt(G.leto_izgradnje);
    if (!isNaN(letoSVH) && letoSVH < 2010 && !G.vzdrzevano) return false;
    return true;
  }

  if (s === 'sta_vse') {
    if (!G.leto_izgradnje || !G.vseljeno || !G.nadstropje || !G.dvigalo) return false;
    const letoSTA = parseInt(G.leto_izgradnje);
    if (!isNaN(letoSTA) && letoSTA < 2010 && !G.vzdrzevano) return false;
    return true;
  }

  if (s === 'pos_vse') {
    return !!(G.vrsta && G.vseljeno && G.vzdrzevano);
  }

  return false;
}

function sprDrugo(etaza, val) {
  if (!G.prostori) G.prostori = {};
  if (!G.prostori[etaza]) G.prostori[etaza] = {};
  if (val.trim()) G.prostori[etaza]['drugo_text'] = val;
  else delete G.prostori[etaza]['drugo_text'];
  G.etaznost = izracunajEtaznost();
}

function sprProstor(etaza, prostor, delta) {
  if (!G.prostori) G.prostori = {};
  if (!G.prostori[etaza]) G.prostori[etaza] = {};

  // Pravilo: 2N zahteva vsaj 1 prostor v 1N
  if (etaza === '2N' && delta > 0) {
    const skupaj1N = Object.values(G.prostori['1N'] || {}).reduce((s,n)=>s+(n||0),0);
    if (skupaj1N === 0) {
      toast('Najprej označite prostore v 1. nadstropju!');
      return;
    }
  }

  const curr = G.prostori[etaza][prostor] || 0;
  const novo = Math.max(0, curr + delta);
  if (novo === 0) delete G.prostori[etaza][prostor];
  else G.prostori[etaza][prostor] = novo;

  // Update UI
  const stEl = document.getElementById('ps-' + etaza + '-' + prostor);
  const piEl = document.getElementById('pi-' + etaza + '-' + prostor);
  if (stEl) stEl.textContent = novo > 0 ? novo : '';
  if (piEl) piEl.classList.toggle('active', novo > 0);

  // Update etaža skupaj
  const skupaj = Object.values(G.prostori[etaza]).reduce((s,n)=>s+(n||0),0);
  const esEl = document.getElementById('es-' + etaza);
  if (esEl) esEl.textContent = skupaj > 0 ? skupaj + ' prostorov' : '';

  // Auto-calculate etaznost
  G.etaznost = izracunajEtaznost();
}

function togNeizd(k, el) {
  if (!G.neizdelano) G.neizdelano = [];
  const i = G.neizdelano.indexOf(k);
  if (i > -1) { G.neizdelano.splice(i,1); el.classList.remove('on'); }
  else        { G.neizdelano.push(k);     el.classList.add('on'); }
  G.etaznost = izracunajEtaznost();
}

function izracunajEtaznost() {
  if (!G.prostori) return '';
  // Etaže ki imajo vsaj 1 prostor ALI so označene kot neizdelane
  const redVrstni = ['K','P','1N','2N','M'];
  const imaProstorov = k => Object.values(G.prostori[k]||{}).reduce((s,n)=>s+(n||0),0) > 0;
  const jeNeizdelana = k => (G.neizdelano||[]).includes(k);
  const aktivne = redVrstni.filter(k => imaProstorov(k) || jeNeizdelana(k));
  if (!aktivne.length) return '';

  // Build etaznost string
  const map = {'K':'K','P':'P','1N':'P+1','2N':'P+2','M':'M'};
  // Smart combination
  const hasK  = aktivne.includes('K');
  const hasP  = aktivne.includes('P');
  const has1N = aktivne.includes('1N');
  const has2N = aktivne.includes('2N');
  const hasM  = aktivne.includes('M');

  let parts = [];
  if (hasK)  parts.push('K');
  if (hasP)  parts.push('P');
  if (has1N) parts.push('1');
  if (has2N) parts.push('2');
  if (hasM)  parts.push('M');

  // Standard notation
  if (parts.length === 0) return '';
  if (parts.join('+') === 'P') return 'P';
  if (parts.join('+') === 'K+P') return 'K+P';
  if (parts.join('+') === 'P+M') return 'P+M';
  if (parts.join('+') === 'P+1') return 'P+1';
  if (parts.join('+') === 'P+1+M') return 'P+1+M';
  if (parts.join('+') === 'K+P+1') return 'K+P+1';
  if (parts.join('+') === 'K+P+1+M') return 'K+P+1+M';
  if (parts.join('+') === 'P+1+2') return 'P+2';
  if (parts.join('+') === 'P+1+2+M') return 'P+2+M';
  if (parts.join('+') === 'K+P+1+2') return 'K+P+2';
  if (parts.join('+') === 'K+P+1+2+M') return 'K+P+2+M';
  return parts.join('+');
}

function validate() {
  const s = steps[stepIdx];
  const err = m => {
    const el = document.getElementById('valErr');
    el.textContent = m; el.classList.add('show');
    el.scrollIntoView({behavior:'smooth', block:'nearest'});
    return false;
  };

  if (s === 'naslov_tip') {
    if (!G.naslov.trim()) return err('Vnesite naslov nepremičnine.');
    if (!G.tip)           return err('Izberite vrsto nepremičnine.');
  } else if (s === 'hisa_vse') {
    if (!G.vrsta)    return err('Izberite tip objekta.');
    if (!G.vseljeno) return err('Izberite ali je hiša vseljena.');
    const leto = parseInt(G.leto_izgradnje);
    const novogradnja = !isNaN(leto) && leto >= 2010;
    if (!novogradnja && !G.vzdrzevano) return err('Izberite vzdrževanost hiše.');
  } else if (s === 'hisa_instalacije') {
    if ((!G.tlaki || !G.tlaki.length) && !G.tlaki_drugo)
      return err('Izberite vsaj en tip finalnih tlakov.');
    if (!G.zasteklitev_tip)   return err('Izberite tip zasteklitve (steklo).');
    if (!G.zasteklitev_okvir) return err('Izberite tip zasteklitve (okvirji).');
    if ((!G.ogr_prostori || !G.ogr_prostori.length) && !G.ogr_prostori_drugo)
      return err('Izberite ogrevanje prostorov.');
    if ((!G.ogr_voda || !G.ogr_voda.length) && !G.ogr_voda_drugo)
      return err('Izberite ogrevanje vode (TSV).');
    if ((!G.ogrevala || !G.ogrevala.length) && !G.ogrevala_drugo)
      return err('Izberite ogrevala.');
  } else if (s === 'hisa_prikljucki') {
    if (!G.prikl_elektrika) return err('Izberite status električne priključitve.');
    if (!G.prikl_vodovod)   return err('Izberite status vodovoda.');
    if (!G.prikl_kanal)     return err('Izberite status kanalizacije.');
    if (!G.prikl_plin)      return err('Izberite status plinovoda.');
    if (!G.prikl_telekom)   return err('Izberite status telekomunikacij.');
    if (!G.prikl_parkiranje || !G.prikl_parkiranje.length) return err('Izberite možnost parkiranja.');
  } else if (s === 'hisa_obnove') {
    const status = (G.obnove||{})['_status'];
    if (!status) {
      const hasAnyLeto = Object.entries(G.obnove||{}).some(([k,v]) => k !== '_status' && v && v.leto);
      if (!hasAnyLeto) return err('Izberite "Ni bilo obnovljeno", "Ni podatka" ali vpišite vsaj eno letnico obnove.');
    }
  } else if (s === 'hisa_prostori') {
    const hasAny = ['K','P','1N','2N','M'].some(e => {
      const ep = (G.prostori||{})[e] || {};
      return Object.values(ep).some(n => n > 0);
    });
    if (!hasAny) return err('Izpolnite vsaj eno etažo s prostori.');
  } else if (s === 'hisa_zakljucek') {
    if (!G.cena_oglas)    return err('Vnesite oglaševalno ceno ali izberite ustrezno možnost.');
    if (!G.cena_pogodba)  return err('Vnesite pogodbeno ceno ali izberite ustrezno možnost.');
    if (!G.dokumentacija) return err('Izberite status dokumentacije.');

  } else if (s === 'svh_vse') {
    if (!G.leto_izgradnje) return err('Vnesite leto izgradnje.');
    if (!G.vseljeno)       return err('Izberite ali je stanovanje vseljeno.');
    if (!G.nadstropje)     return err('Izberite nadstropje stanovanja.');
    if (!G.dvigalo)        return err('Izberite ali ima objekt dvigalo.');
    if (!G.st_stanovanj)   return err('Izberite število stanovanj v objektu.');
    const letoSVHv = parseInt(G.leto_izgradnje);
    if (!isNaN(letoSVHv) && letoSVHv < 2010 && !G.vzdrzevano) return err('Izberite vzdrževanost stanovanja.');

  } else if (s === 'sta_vse') {
    if (!G.leto_izgradnje) return err('Vnesite leto izgradnje.');
    if (!G.vseljeno)       return err('Izberite ali je stanovanje vseljeno.');
    if (!G.nadstropje)     return err('Izberite nadstropje stanovanja.');
    if (!G.dvigalo)        return err('Izberite ali ima objekt dvigalo.');
    const letoSTAv = parseInt(G.leto_izgradnje);
    if (!isNaN(letoSTAv) && letoSTAv < 2010 && !G.vzdrzevano) return err('Izberite vzdrževanost stanovanja.');
  } else if (s === 'sta_prostori') {
    const ep = (G.prostori||{})['STA'] || {};
    const hasAny = Object.entries(ep).some(([k,n]) => k !== 'drugo_text' && n > 0);
    const hasDrugo = ep['drugo_text'] && ep['drugo_text'].trim();
    if (!hasAny && !hasDrugo) return err('Izpolnite vsaj en prostor.');
  } else if (s === 'svh_prostori') {
    const hasAnySVH = ['K','P','1N','2N','M'].some(e => {
      const ep2 = (G.prostori||{})[e] || {};
      return Object.values(ep2).some(n => n > 0);
    });
    if (!hasAnySVH) return err('Izpolnite vsaj eno etažo s prostori.');

  } else if (s === 'svh_instalacije' || s === 'sta_instalacije') {
    if ((!G.tlaki||!G.tlaki.length) && !G.tlaki_drugo) return err('Izberite vsaj en tip finalnih tlakov.');
    if (!G.zasteklitev_tip)   return err('Izberite tip zasteklitve (steklo).');
    if (!G.zasteklitev_okvir) return err('Izberite tip zasteklitve (okvirji).');
    if ((!G.ogr_prostori||!G.ogr_prostori.length) && !G.ogr_prostori_drugo) return err('Izberite ogrevanje prostorov.');
    if ((!G.ogr_voda||!G.ogr_voda.length) && !G.ogr_voda_drugo) return err('Izberite ogrevanje vode (TSV).');
    if ((!G.ogrevala||!G.ogrevala.length) && !G.ogrevala_drugo) return err('Izberite ogrevala.');

  } else if (s === 'svh_prikljucki' || s === 'pos_prikljucki') {
    if (!G.prikl_elektrika) return err('Izberite status električne priključitve.');
    if (!G.prikl_vodovod)   return err('Izberite status vodovoda.');
    if (!G.prikl_kanal)     return err('Izberite status kanalizacije.');
    if (!G.prikl_plin)      return err('Izberite status plinovoda.');
    if (!G.prikl_telekom)   return err('Izberite status telekomunikacij.');
    if (!G.prikl_parkiranje || !G.prikl_parkiranje.length) return err('Izberite možnost parkiranja.');

  } else if (s === 'svh_obnove' || s === 'sta_obnove') {
    const status = (G.obnove||{})['_status'];
    if (!status) {
      const hasAnyLeto = Object.entries(G.obnove||{}).some(([k,v]) => k !== '_status' && v && v.leto);
      if (!hasAnyLeto) return err('Izberite "Ni bilo obnovljeno", "Ni podatka" ali vpišite vsaj eno letnico.');
    }

  } else if (s === 'svh_zakljucek' || s === 'sta_zakljucek' || s === 'pos_zakljucek') {
    if (!G.cena_oglas)    return err('Vnesite oglaševalno ceno ali izberite ustrezno možnost.');
    if (!G.cena_pogodba)  return err('Vnesite pogodbeno ceno ali izberite ustrezno možnost.');
    if (!G.dokumentacija) return err('Izberite status dokumentacije.');

  } else if (s === 'pos_vse') {
    if (!G.vrsta)     return err('Izberite tip poslovnega objekta.');
    if (!G.vseljeno)  return err('Izberite ali je objekt zaseden.');
    if (!G.vzdrzevano) return err('Izberite vzdrževanost objekta.');

  } else if (s === 'pos_prostori') {
    const ep = (G.prostori||{})['POS'] || {};
    const hasAny = Object.entries(ep).some(([k,n]) => k !== 'drugo_text' && n > 0);
    const hasDrugo = ep['drugo_text'] && ep['drugo_text'].trim();
    if (!hasAny && !hasDrugo) return err('Izpolnite vsaj en prostor.');
  }

  return true;
}

function renderSummary() {
  const rows = [];
  if (G.naslov)          rows.push(['Naslov', G.naslov]);
  if (G.tip)             rows.push(['Vrsta', tipL(G.tip)]);
  if (G.vrsta)           rows.push(['Tip objekta', G.vrsta]);
  if (G.leto_izgradnje)  rows.push(['Leto izgradnje', G.leto_izgradnje]);
  if (G.vseljeno)        rows.push(['Vseljena', G.vseljeno]);
  if (G.vzdrzevano)      rows.push(['Vzdrževana', G.vzdrzevano]);

  // Etažnost + prostori
  if (G.etaznost) rows.push(['Etažnost', G.etaznost]);
  if (G.nadstropje) rows.push(['Nadstropje', G.nadstropje]);
  const orientSmeri = [];
  if (G.orient_S) orientSmeri.push('S');
  if (G.orient_J) orientSmeri.push('J');
  if (G.orient_V) orientSmeri.push('V');
  if (G.orient_Z) orientSmeri.push('Z');
  if (orientSmeri.length) rows.push(['Orientacija', orientSmeri.join(', ')]);
  if (G.dvigalo) rows.push(['Dvigalo', G.dvigalo]);
  if (G.st_stanovanj) rows.push(['Štev. enot', G.st_stanovanj]);

  const PROS_IME2 = {
    predprostor:'predprostor', hodnik:'hodnik', tehnicni:'teh. prostor',
    kurilnica:'kurilnica', shramba:'shramba', utility:'utility', garaza:'garaža',
    stranisce:'stranišče', kopalnica:'kopalnica', soba:'soba', spalnica:'spalnica',
    kuhinja:'kuhinja', jedilnica:'jedilnica', dnevna:'dnevna soba', galerija:'galerija',
    loza:'loža', balkon:'balkon', terasa:'terasa',
    pisarna:'pisarna', sejna:'sejna soba', recepcija:'recepcija', arhiv:'arhiv',
    skladisce:'skladišče',
  };
  // Prostori po etažah (hiša, svh)
  if (G.prostori && (G.tip === 'hisa' || G.tip === 'stan_v_hisi')) {
    const ETAZ_L = {K:'K', P:'P', '1N':'1N', '2N':'2N', M:'M'};
    ['K','P','1N','2N','M'].forEach(function(e) {
      const ep = G.prostori[e] || {};
      const jeNeizd = (G.neizdelano||[]).includes(e);
      if (jeNeizd) { rows.push([ETAZ_L[e], 'neizdelano']); return; }
      const seznam = [];
      Object.entries(ep).forEach(function(kv) {
        const k = kv[0], n = kv[1];
        if (!n || k === 'drugo_text') return;
        seznam.push(n > 1 ? n + 'x ' + (PROS_IME2[k]||k) : (PROS_IME2[k]||k));
      });
      if (ep['drugo_text']) seznam.push(ep['drugo_text']);
      if (seznam.length) rows.push([ETAZ_L[e], seznam.join(', ')]);
    });
  }
  // Prostori flat (stanovanje)
  if (G.prostori && G.tip === 'stanovanje') {
    const epSTA = G.prostori['STA'] || {};
    const seznamSTA = [];
    Object.entries(epSTA).forEach(function(kv) {
      const k = kv[0], n = kv[1];
      if (!n || k === 'drugo_text') return;
      seznamSTA.push(n > 1 ? n + 'x ' + (PROS_IME2[k]||k) : (PROS_IME2[k]||k));
    });
    if (epSTA['drugo_text']) seznamSTA.push(epSTA['drugo_text']);
    if (seznamSTA.length) rows.push(['Prostori', seznamSTA.join(', ')]);
  }
  // Prostori poslovni
  if (G.prostori && G.tip === 'poslovni') {
    const epPOS = G.prostori['POS'] || {};
    const seznamPOS = [];
    Object.entries(epPOS).forEach(function(kv) {
      const k = kv[0], n = kv[1];
      if (!n || k === 'drugo_text') return;
      seznamPOS.push(n > 1 ? n + 'x ' + (PROS_IME2[k]||k) : (PROS_IME2[k]||k));
    });
    if (epPOS['drugo_text']) seznamPOS.push(epPOS['drugo_text']);
    if (seznamPOS.length) rows.push(['Prostori', seznamPOS.join(', ')]);
  }

  // Inštalacije
  if (G.tlaki && G.tlaki.length) rows.push(['Tlaki', [...G.tlaki, ...(G.tlaki_drugo?[G.tlaki_drugo]:[])].join(', ')]);
  if (G.zasteklitev_tip) rows.push(['Zasteklitev', [G.zasteklitev_tip, G.zasteklitev_okvir].filter(Boolean).join(', ')]);
  if (G.ogr_prostori && G.ogr_prostori.length) rows.push(['Ogrevanje', G.ogr_prostori.join(', ')]);
  if (G.ogrevala && G.ogrevala.length) rows.push(['Ogrevala', G.ogrevala.join(', ')]);

  // Priključki
  const priklYes = [];
  if (G.prikl_elektrika === 'Da') priklYes.push('elektrika');
  if (G.prikl_vodovod   === 'Da') priklYes.push('vodovod');
  if (G.prikl_kanal     === 'Da') priklYes.push('kanalizacija');
  if (G.prikl_plin      === 'Da') priklYes.push('plin');
  if (G.prikl_telekom   === 'Da') priklYes.push('telekom');
  if (priklYes.length) rows.push(['Priključki', priklYes.join(', ')]);
  if (G.prikl_parkiranje && G.prikl_parkiranje.length) rows.push(['Parkiranje', G.prikl_parkiranje.join(', ')]);

  // Obnove
  if (G.obnove) {
    const status = G.obnove['_status'];
    if (status === 'ni_obnovljeno') rows.push(['Obnove', 'Ni bilo obnovljeno']);
    else if (status === 'ni_podatka') rows.push(['Obnove', 'Ni podatka']);
    else {
      const obnoveList = [];
      const obnIme = {celotna:'v celoti',streha:'streha',fasada:'fasada',okna:'okna',
        vrata_vh:'vhodna vrata',vrata_not:'notranja vrata',tlaki:'tlaki',
        radiatorji:'radiatorji',el_inst:'el. inst.',vod_inst:'vod. inst.',
        kopalnica:'kopalnica',stranisce:'stranišče',pec:'peč'};
      Object.entries(G.obnove).forEach(([k,v]) => {
        if (k === '_status' || !v || !v.leto) return;
        const ime = k === 'drugo' ? (v.ime || 'drugo') : (obnIme[k] || k);
        obnoveList.push(v.leto + ': ' + ime);
      });
      if (obnoveList.length) rows.push(['Obnove', obnoveList.join(' | ')]);
    }
  }

  // Zaključek — cene
  if (G.cena_oglas) {
    const cv = G.cena_oglas === 'ne_prodaja' ? 'ne prodaja' : G.cena_oglas === 'ne_povejo' ? 'ne povejo' : G.cena_oglas + ' €';
    rows.push(['Cena (oglas)', cv]);
  }
  if (G.cena_pogodba) {
    const cv = G.cena_pogodba === 'ne_prodaja' ? 'ne prodaja' : G.cena_pogodba === 'ne_povejo' ? 'ne povejo' : G.cena_pogodba + ' €';
    rows.push(['Cena (pogodba)', cv]);
  }
  if (G.dokumentacija) rows.push(['Dokumentacija', G.dokumentacija]);
  if (G.posebnosti)    rows.push(['Posebnosti', G.posebnosti]);
  if (G.datum)         rows.push(['Datum ogleda', G.datum]);

  document.getElementById('sumContent').innerHTML = rows.map(([k,v]) => `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;
      padding:7px 0;border-bottom:1px solid var(--border);gap:8px;">
      <span style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;">${k}</span>
      <span style="font-size:13px;font-weight:600;color:var(--black);text-align:right;">${Array.isArray(v)?v.join(', '):v}</span>
    </div>`).join('');
}
